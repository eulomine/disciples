<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>나를 따르라 - Follow Me</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:sans-serif;background:#333;touch-action:none;user-select:none}
#topBar{position:fixed;top:0;left:0;right:0;height:38px;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:12px;font-weight:bold;color:#333;z-index:10;border-bottom:2px solid #8BC34A}
#versebar{position:fixed;top:40px;left:8px;right:8px;text-align:center;font-size:11px;color:#fff;background:rgba(0,0,0,0.6);padding:4px 8px;z-index:10;display:none;border-radius:0 0 8px 8px}
#stageLabel{position:fixed;top:40px;left:6px;z-index:9;background:rgba(0,0,0,0.4);color:#fff;font-size:9px;padding:2px 6px;border-radius:6px}
#followerBar{position:fixed;bottom:0;left:0;right:0;height:38px;background:rgba(255,255,255,0.92);display:flex;align-items:center;padding:0 4px;gap:2px;z-index:10;overflow-x:auto;border-top:2px solid #8BC34A}
.fi{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#333;font-weight:bold;flex-shrink:0;border:1px solid rgba(0,0,0,0.1)}
canvas{display:block;position:fixed;top:38px;left:0}
#ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;padding:16px;overflow-y:auto}
#ov h1{font-size:24px;color:#FFD54F;margin-bottom:4px}
#ov h2{font-size:14px;color:#C8E6C9;margin-bottom:8px}
#ov p{font-size:12px;text-align:center;max-width:300px;line-height:1.5;margin:3px 0}
#ov input{padding:8px;font-size:15px;border:2px solid #8BC34A;border-radius:8px;text-align:center;width:180px;margin:6px 0;color:#333}
#ov button{padding:10px 32px;font-size:16px;background:#8BC34A;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:6px;font-weight:bold}
#ov button:active{background:#689F38}
.rb{max-height:140px;overflow-y:auto;width:100%;max-width:300px;margin:4px 0}
.rr{display:flex;justify-content:space-between;padding:2px 6px;font-size:10px;border-bottom:1px solid rgba(255,255,255,0.12)}
.rr:nth-child(-n+4){color:#FFD54F;font-weight:bold}
#muteBtn{position:fixed;top:40px;right:6px;z-index:20;background:rgba(255,255,255,0.8);border:none;border-radius:50%;width:28px;height:28px;font-size:14px}
</style>
</head>
<body>
<div id="topBar"><span id="sd">점수: 0</span><span id="td">⏱ 0초</span><span id="cd">제자: 0/20</span></div>
<div id="versebar"></div>
<div id="stageLabel"></div>
<canvas id="c"></canvas>
<div id="followerBar"></div>
<div id="ov"></div>
<button id="muteBtn">🔊</button>
<script>
(function(){
"use strict";

var CHARS=[
{name:"아브라함",skin:"#C49A6C",robe:"#F5F5DC",robe2:"#E8DCC8",hair:"#4E342E",verse:"믿음의 조상 (창 12:1)",beard:1,stage:0},
{name:"사라",skin:"#FFDAB9",robe:"#E8D5E0",robe2:"#D8C5D0",hair:"#5D4037",verse:"믿음으로 잉태 (히 11:11)",fem:1,stage:1},
{name:"이삭",skin:"#C49A6C",robe:"#D5E8D0",robe2:"#C5D8C0",hair:"#5D4037",verse:"순종의 아들 (창 22:9)",stage:2},
{name:"야곱",skin:"#C49A6C",robe:"#B3D4E8",robe2:"#A3C4D8",hair:"#4E342E",verse:"이스라엘이 되다 (창 32:28)",stage:3},
{name:"요셉",skin:"#C49A6C",robe:"#FFF8C4",robe2:"#EFE8B4",hair:"#3E2723",verse:"하나님이 뜻한 것은 선 (창 50:20)",stage:4},
{name:"모세",skin:"#B08860",robe:"#D7CCC8",robe2:"#C7BCB8",hair:"#4E342E",verse:"내 백성을 보내라 (출 5:1)",beard:1,staff:1,stage:5},
{name:"여호수아",skin:"#A0785A",robe:"#C8E0C8",robe2:"#B8D0B8",hair:"#3E2723",verse:"강하고 담대하라 (수 1:9)",stage:6},
{name:"룻",skin:"#FFDAB9",robe:"#F0C0D0",robe2:"#E0B0C0",hair:"#5D4037",verse:"주의 백성이 내 백성 (룻 1:16)",fem:1,stage:7},
{name:"다윗",skin:"#C49A6C",robe:"#B0C8E8",robe2:"#A0B8D8",hair:"#5D4037",verse:"여호와는 나의 목자 (시 23:1)",crown:1,stage:8},
{name:"솔로몬",skin:"#C49A6C",robe:"#E8D080",robe2:"#D8C070",hair:"#3E2723",verse:"지혜의 근본은 여호와 (잠 9:10)",crown:1,stage:9},
{name:"엘리야",skin:"#A0785A",robe:"#C8B8A0",robe2:"#B8A890",hair:"#4E342E",verse:"여호와가 하나님 (왕상 18:39)",beard:1,staff:1,stage:10},
{name:"이사야",skin:"#B08860",robe:"#B8B8D8",robe2:"#A8A8C8",hair:"#4E342E",verse:"임마누엘 (사 7:14)",beard:1,stage:11},
{name:"다니엘",skin:"#C49A6C",robe:"#A8C8C0",robe2:"#98B8B0",hair:"#3E2723",verse:"사자 굴에서 구원 (단 6:22)",stage:12},
{name:"에스더",skin:"#FFDAB9",robe:"#E0D0F0",robe2:"#D0C0E0",hair:"#3E2723",verse:"이 때를 위함이라 (에 4:14)",fem:1,crown:1,stage:13},
{name:"세례요한",skin:"#A0785A",robe:"#C0A880",robe2:"#B09870",hair:"#5D4037",verse:"회개하라 천국이 가까이 (마 3:2)",beard:1,stage:14},
{name:"베드로",skin:"#B08860",robe:"#A0B8D8",robe2:"#90A8C8",hair:"#5D4037",verse:"주는 그리스도시요 (마 16:16)",beard:1,stage:15},
{name:"바울",skin:"#C49A6C",robe:"#D0B8D8",robe2:"#C0A8C8",hair:"#4E342E",verse:"내게 사는 것이 그리스도 (빌 1:21)",beard:1,stage:16},
{name:"엄마",skin:"#FFDAB9",robe:"#FFE0E8",robe2:"#F0D0D8",hair:"#3E2723",verse:"마땅히 행할 길을 아이에게 가르치라 (잠 22:6)",fem:1,mod:1,stage:17},
{name:"나",skin:"#FFDAB9",robe:"#D0E8FF",robe2:"#C0D8EF",hair:"#2C2C2C",verse:"내가 그리스도와 함께 십자가에 (갈 2:20)",mod:1,stage:18},
{name:"친구",skin:"#C49A6C",robe:"#FFF0D0",robe2:"#EFE0C0",hair:"#2C2C2C",verse:"너희는 가서 모든 민족을 제자로 삼으라 (마 28:19)",mod:1,stage:19}
];
var JESUS={name:"예수님",skin:"#FFDAB9",robe:"#FFFFFF",robe2:"#F0F0F0",hair:"#5D4037",beard:1};
var BONUS=[{e:"🍞",p:30,v:"나는 생명의 떡이니 (요 6:35)"},{e:"🐟",p:25,v:"사람을 낚는 어부 (마 4:19)"},{e:"⭐",p:50,v:"동방의 별이 인도하니 (마 2:9)"},{e:"💧",p:20,v:"생수의 강이 흐르리라 (요 7:38)"},{e:"🕊️",p:20,v:"성령이 비둘기같이 (마 3:16)"}];
var OVERV=["피곤한 자와 무거운 짐 진 자들아 다 내게로 오라 (마 11:28)","내가 너를 강하게 하리라 (사 41:10)","항상 기뻐하라 쉬지 말고 기도하라 (살전 5:16-17)","여호와를 앙망하는 자는 새 힘을 얻으리니 (사 40:31)","범사에 감사하라 (살전 5:18)"];
var SN=["우르 - 아브라함의 부름","가나안 - 사라와 함께","모리아산 - 이삭의 순종","벧엘 - 야곱의 사다리","애굽 - 요셉의 궁전","시내산 - 모세의 사명","요단강 - 여호수아의 정복","베들레헴 - 룻의 들판","유다 광야 - 다윗의 목초지","예루살렘 - 솔로몬의 성전","갈멜산 - 엘리야의 대결","예루살렘 - 이사야의 예언","바벨론 - 다니엘의 신앙","수산성 - 에스더의 용기","요단 광야 - 세례요한","갈릴리 호수 - 베드로","다메섹 길 - 바울의 회심","우리 집 - 엄마의 사랑","우리 동네 - 나의 결단","학교 - 친구에게","교회로 가는 길"];

var cv=document.getElementById("c"),cx=cv.getContext("2d");
var CW,CH,GS,COLS,ROWS;
function resize(){
  var w=window.innerWidth,h=window.innerHeight-76;
  GS=Math.floor(Math.min(w,h)/10);
  if(GS<30)GS=30;if(GS>56)GS=56;
  COLS=Math.floor(w/GS);ROWS=Math.floor(h/GS);
  if(COLS<6)COLS=6;if(ROWS<6)ROWS=6;
  CW=COLS*GS;CH=ROWS*GS;cv.width=CW;cv.height=CH;bgDirty=true;
}

var snake,dir,ndir,score,spd,gt,tid,rem,col2,tgt,bon,pts,run,cstg,bgC,bgDirty,pname,loopId;
var church=null,ending=false;

function init(){
  var sx=Math.floor(COLS/2),sy=Math.floor(ROWS/2);
  snake=[{x:sx,y:sy}];dir={x:1,y:0};ndir={x:1,y:0};
  score=0;spd=200;gt=0;rem=CHARS.slice();col2=[];tgt=null;bon=null;pts=[];
  run=false;cstg=-1;bgDirty=true;church=null;ending=false;
  document.getElementById("followerBar").innerHTML="";ui();spawn();
}
function spawn(){
  if(!rem.length){tgt=null;placeChurch();return;}
  var ch=rem[0],p=rndE();tgt={x:p.x,y:p.y,c:ch};
  if(ch.stage!==cstg){cstg=ch.stage;bgDirty=true;document.getElementById("stageLabel").textContent=SN[cstg]||"";}
}
function placeChurch(){
  sv("🏠 이제 교회로 가세요!");cstg=20;bgDirty=true;
  document.getElementById("stageLabel").textContent=SN[20]||"";
  var p=rndE();church={x:p.x,y:p.y};
}
function spawnB(){if(bon||Math.random()>0.4)return;var b=BONUS[Math.random()*BONUS.length|0],p=rndE();bon={x:p.x,y:p.y,e:b.e,p:b.p,v:b.v};}
function rndE(){for(var t=0;t<500;t++){var x=Math.random()*COLS|0,y=Math.random()*ROWS|0,ok=true;for(var i=0;i<snake.length;i++)if(snake[i].x===x&&snake[i].y===y){ok=false;break;}if(tgt&&tgt.x===x&&tgt.y===y)ok=false;if(bon&&bon.x===x&&bon.y===y)ok=false;if(church&&church.x===x&&church.y===y)ok=false;if(ok)return{x:x,y:y};}return{x:0,y:0};}

function sr(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ===================== BACKGROUNDS ===================== */
function mkBG(){
  bgC=document.createElement("canvas");bgC.width=CW;bgC.height=CH;
  var g=bgC.getContext("2d");
  switch(cstg){
    case 0:bg0(g);break;case 1:bg1(g);break;case 2:bg2(g);break;
    case 3:bg3(g);break;case 4:bg4(g);break;case 5:bg5(g);break;
    case 6:bg6(g);break;case 7:bg7(g);break;case 8:bg8(g);break;
    case 9:bg9(g);break;case 10:bg10(g);break;case 11:bg11(g);break;
    case 12:bg12(g);break;case 13:bg13(g);break;case 14:bg14(g);break;
    case 15:bg15(g);break;case 16:bg16(g);break;case 17:bg17(g);break;
    case 18:bg18(g);break;case 19:bg19(g);break;case 20:bg20(g);break;
    default:bg0(g);
  }
  g.strokeStyle="rgba(0,0,0,0.04)";g.lineWidth=0.5;
  for(var x=0;x<=COLS;x++){g.beginPath();g.moveTo(x*GS,0);g.lineTo(x*GS,CH);g.stroke();}
  for(var y=0;y<=ROWS;y++){g.beginPath();g.moveTo(0,y*GS);g.lineTo(CW,y*GS);g.stroke();}
  bgDirty=false;
}

// helpers
function grassBase(g,c1,c2,c3){var gr=g.createLinearGradient(0,0,CW,CH);gr.addColorStop(0,c1);gr.addColorStop(0.5,c2);gr.addColorStop(1,c3);g.fillStyle=gr;g.fillRect(0,0,CW,CH);var r=sr(cstg*100);for(var i=0;i<180;i++){g.fillStyle="rgba("+(70+r()*50|0)+","+(120+r()*60|0)+","+(30+r()*30|0)+",0.2)";g.fillRect(r()*CW,r()*CH,GS*0.3,GS*0.1);}}
function sandBase(g,c1,c2){var gr=g.createLinearGradient(0,0,CW,CH);gr.addColorStop(0,c1);gr.addColorStop(1,c2);g.fillStyle=gr;g.fillRect(0,0,CW,CH);var r=sr(cstg*100);for(var i=0;i<100;i++){g.fillStyle="rgba("+(170+r()*40|0)+","+(145+r()*35|0)+","+(80+r()*30|0)+",0.12)";g.fillRect(r()*CW,r()*CH,3,2);}}
function dirtPath(g,x1,y1,x2,y2,x3,y3){g.strokeStyle="rgba(180,150,100,0.4)";g.lineWidth=GS*0.8;g.lineCap="round";g.beginPath();g.moveTo(x1,y1);g.quadraticCurveTo(x2,y2,x3,y3);g.stroke();}
function flowers(g,n){var r=sr(cstg*200),fc=["#E53935","#FDD835","#AB47BC","#F48FB1","#fff"];for(var i=0;i<n;i++){g.fillStyle=fc[r()*fc.length|0];g.beginPath();g.arc(r()*CW,r()*CH,1.5+r()*2,0,6.28);g.fill();}}
function tree(g,x,y,rad){g.fillStyle="rgba(50,90,30,0.4)";g.beginPath();g.arc(x,y,rad,0,6.28);g.fill();g.fillStyle="rgba(70,120,45,0.3)";g.beginPath();g.arc(x-rad*0.2,y-rad*0.2,rad*0.6,0,6.28);g.fill();}
function rock(g,x,y,rx,ry){g.fillStyle="rgba(140,130,110,0.45)";g.beginPath();g.ellipse(x,y,rx,ry,0,0,6.28);g.fill();g.fillStyle="rgba(160,150,130,0.3)";g.beginPath();g.ellipse(x-rx*0.2,y-ry*0.2,rx*0.5,ry*0.5,0,0,6.28);g.fill();}
function mountain(g,x1,peak,x2,yb,col){g.fillStyle=col;g.beginPath();g.moveTo(x1,yb);g.lineTo((x1+x2)/2,peak);g.lineTo(x2,yb);g.closePath();g.fill();}
function water(g,x,y,rx,ry){g.fillStyle="rgba(80,170,220,0.35)";g.beginPath();g.ellipse(x,y,rx,ry,0,0,6.28);g.fill();g.strokeStyle="rgba(60,150,200,0.15)";g.lineWidth=0.8;for(var i=1;i<5;i++){g.beginPath();g.ellipse(x,y,rx-i*rx*0.15,ry-i*ry*0.15,0,0,6.28);g.stroke();}}
function river(g,x,w){g.fillStyle="rgba(70,155,210,0.35)";g.fillRect(x-w/2,0,w,CH);g.strokeStyle="rgba(50,135,190,0.15)";g.lineWidth=0.8;for(var y=0;y<CH;y+=15){g.beginPath();g.moveTo(x-w/3+Math.sin(y*0.05)*w*0.15,y);g.lineTo(x+w/3+Math.sin(y*0.05)*w*0.15,y);g.stroke();}}
function stars(g,n){var r=sr(cstg*300);for(var i=0;i<n;i++){g.fillStyle="rgba(255,255,200,"+(0.2+r()*0.3)+")";g.beginPath();g.arc(r()*CW,r()*CH*0.3,0.5+r()*1.5,0,6.28);g.fill();}}
function tent(g,x,y,w,h){g.fillStyle="rgba(180,140,90,0.6)";g.beginPath();g.moveTo(x,y+h);g.lineTo(x+w/2,y);g.lineTo(x+w,y+h);g.closePath();g.fill();g.strokeStyle="rgba(120,90,50,0.3)";g.lineWidth=1;g.stroke();g.fillStyle="rgba(60,40,20,0.3)";g.fillRect(x+w*0.38,y+h*0.5,w*0.24,h*0.5);}
function pillar(g,x,y,w,h){g.fillStyle="rgba(220,210,180,0.7)";g.fillRect(x,y,w,h);g.fillStyle="rgba(200,190,160,0.5)";g.fillRect(x-w*0.2,y,w*1.4,h*0.08);g.fillRect(x-w*0.2,y+h*0.92,w*1.4,h*0.08);}

// 0: 아브라함 - 우르, 별이 빛나는 밤하늘 아래 텐트, 제단
function bg0(g){
  grassBase(g,"#5A8838","#6A9848","#4A7828");
  dirtPath(g,0,CH*0.6,CW*0.5,CH*0.5,CW,CH*0.55);
  tent(g,CW*0.1,CH*0.2,GS*2.5,GS*1.8);
  // altar
  rock(g,CW*0.75,CH*0.3,GS*0.5,GS*0.35);rock(g,CW*0.76,CH*0.25,GS*0.3,GS*0.2);
  // fire on altar
  g.fillStyle="rgba(255,140,0,0.35)";g.beginPath();g.arc(CW*0.75,CH*0.2,GS*0.25,0,6.28);g.fill();
  stars(g,25);flowers(g,15);
  tree(g,CW*0.88,CH*0.7,GS*0.6);
}
// 1: 사라 - 가나안 천막 안, 아기 요람 느낌
function bg1(g){
  grassBase(g,"#6A9848","#7AAA55","#5A8838");
  tent(g,CW*0.05,CH*0.15,GS*3,GS*2.2);
  tent(g,CW*0.65,CH*0.1,GS*2.5,GS*1.8);
  // cradle hint
  g.fillStyle="rgba(180,140,90,0.4)";g.beginPath();g.ellipse(CW*0.4,CH*0.7,GS*0.6,GS*0.3,0,0,6.28);g.fill();
  g.strokeStyle="rgba(120,80,40,0.3)";g.lineWidth=1.5;g.beginPath();g.arc(CW*0.4,CH*0.7,GS*0.6,3.4,6.0);g.stroke();
  flowers(g,20);tree(g,CW*0.85,CH*0.85,GS*0.5);
  dirtPath(g,CW*0.3,0,CW*0.4,CH*0.5,CW*0.35,CH);
}
// 2: 이삭 - 모리아산, 제단, 덤불에 걸린 양
function bg2(g){
  sandBase(g,"#C8B078","#A09058");
  mountain(g,CW*0.15,CH*0.1,CW*0.85,CH,"#8B7355");
  mountain(g,CW*0.25,CH*0.2,CW*0.75,CH,"#9B8365");
  // altar stones
  g.fillStyle="rgba(160,140,110,0.6)";g.fillRect(CW*0.4,CH*0.45,GS*1.5,GS*0.6);
  rock(g,CW*0.42,CH*0.45,GS*0.25,GS*0.2);rock(g,CW*0.55,CH*0.44,GS*0.2,GS*0.18);
  // wood on altar
  g.strokeStyle="rgba(120,80,30,0.4)";g.lineWidth=3;g.beginPath();g.moveTo(CW*0.42,CH*0.43);g.lineTo(CW*0.58,CH*0.43);g.stroke();
  g.beginPath();g.moveTo(CW*0.45,CH*0.42);g.lineTo(CW*0.55,CH*0.44);g.stroke();
  // bush with ram
  g.fillStyle="rgba(80,120,50,0.5)";g.beginPath();g.arc(CW*0.8,CH*0.5,GS*0.5,0,6.28);g.fill();
  g.fillStyle="rgba(230,220,200,0.6)";g.beginPath();g.ellipse(CW*0.8,CH*0.48,GS*0.2,GS*0.15,0,0,6.28);g.fill();
  // ram horns
  g.strokeStyle="rgba(160,130,80,0.5)";g.lineWidth=2;g.beginPath();g.arc(CW*0.78,CH*0.45,GS*0.1,0.5,2.5);g.stroke();g.beginPath();g.arc(CW*0.82,CH*0.45,GS*0.1,0.8,2.8);g.stroke();
  dirtPath(g,CW*0.3,CH,CW*0.5,CH*0.6,CW*0.5,CH*0.35);
}

  cx.beginPath();cx.arc(px+hw*0.18,py-hh*0.35,hw*0.02,0,6.28);cx.fill();

  // === NOSE ===
  cx.strokeStyle="rgba(0,0,0,0.1)";cx.lineWidth=0.8;
  cx.beginPath();cx.moveTo(px,py-hh*0.28);cx.quadraticCurveTo(px+hw*0.05,py-hh*0.2,px,py-hh*0.17);cx.stroke();

  // === MOUTH ===
  if(!ch.beard&&!jesus){cx.strokeStyle="rgba(0,0,0,0.12)";cx.lineWidth=0.6;cx.beginPath();cx.arc(px,py-hh*0.12,hw*0.06,0.2,2.94);cx.stroke();}

  // === CROWN ===
  if(ch.crown){
    cx.fillStyle="#FFD700";var crY=py-hh*0.6;
    cx.beginPath();cx.moveTo(px-hw*0.34,crY+hw*0.18);cx.lineTo(px-hw*0.34,crY);cx.lineTo(px-hw*0.17,crY+hw*0.1);cx.lineTo(px,crY-hw*0.06);cx.lineTo(px+hw*0.17,crY+hw*0.1);cx.lineTo(px+hw*0.34,crY);cx.lineTo(px+hw*0.34,crY+hw*0.18);cx.closePath();cx.fill();
    cx.strokeStyle="#DAA520";cx.lineWidth=0.6;cx.stroke();
    cx.fillStyle="#E53935";cx.beginPath();cx.arc(px,crY+hw*0.07,1.5,0,6.28);cx.fill();
    cx.fillStyle="#2196F3";cx.beginPath();cx.arc(px-hw*0.17,crY+hw*0.11,1.2,0,6.28);cx.fill();
    cx.beginPath();cx.arc(px+hw*0.17,crY+hw*0.11,1.2,0,6.28);cx.fill();
  }

  // === STAFF ===
  if(ch.staff){
    cx.strokeStyle="#7B4513";cx.lineWidth=2.5;cx.lineCap="round";
    cx.beginPath();cx.moveTo(px+hw*0.65,py-hh*0.4);cx.lineTo(px+hw*0.6,py+hh*0.9);cx.stroke();
    cx.strokeStyle="#6B3503";cx.lineWidth=1.5;
    cx.beginPath();cx.arc(px+hw*0.63,py-hh*0.43,hw*0.07,1.2,4.8);cx.stroke();
  }

  // === JESUS SPECIAL ===
  if(jesus){
    cx.fillStyle="rgba(255,215,0,0.07)";cx.beginPath();cx.arc(px,py-hh*0.35,hw*0.75,0,6.28);cx.fill();
    cx.strokeStyle="rgba(255,215,0,0.45)";cx.lineWidth=2.5;cx.beginPath();cx.arc(px,py-hh*0.38,hw*0.58,0,6.28);cx.stroke();
    cx.strokeStyle="rgba(255,215,0,0.2)";cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(px,py-hh*0.38-hw*0.55);cx.lineTo(px,py-hh*0.38+hw*0.55);cx.stroke();
    cx.beginPath();cx.moveTo(px-hw*0.55,py-hh*0.38);cx.lineTo(px+hw*0.55,py-hh*0.38);cx.stroke();
    // red sash
    cx.fillStyle="rgba(183,28,28,0.5)";
    cx.beginPath();cx.moveTo(px+hw*0.1,py-hh*0.06);cx.quadraticCurveTo(px-hw*0.18,py+hh*0.25,px+hw*0.06,py+hh*0.55);cx.lineTo(px+hw*0.22,py+hh*0.55);cx.quadraticCurveTo(px,py+hh*0.25,px+hw*0.28,py-hh*0.06);cx.closePath();cx.fill();
    cx.strokeStyle="rgba(120,20,20,0.12)";cx.lineWidth=0.5;cx.stroke();
  }

  // === NAME LABEL ===
  var fs=Math.max(8,w*0.19|0);
  cx.font="bold "+fs+"px sans-serif";cx.textAlign="center";cx.textBaseline="top";
  var nm=ch.name,tw2=cx.measureText(nm).width;
  cx.fillStyle="rgba(0,0,0,0.35)";cx.fillRect(px-tw2/2-3,py+hh+2,tw2+6,fs+3);
  cx.fillStyle="#fff";cx.fillText(nm,px,py+hh+3);

  cx.restore();
}

/* ========== SOUND ========== */
var ac,mut=false,bgmI;
function ia(){if(ac)return;try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function pn(f,d,v,tp,dl){if(!ac||mut)return;try{var t=ac.currentTime+(dl||0),o=ac.createOscillator(),g=ac.createGain();o.type=tp||"sine";o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v||0.05,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+d);}catch(e){}}
function sC(){pn(523,0.1,0.07,"sine",0);pn(659,0.1,0.07,"sine",0.1);pn(784,0.15,0.07,"sine",0.2);}
function sB(){pn(880,0.08,0.05,"triangle",0);pn(1108,0.08,0.05,"triangle",0.08);pn(1318,0.12,0.05,"triangle",0.16);}
function sO(){pn(392,0.3,0.07,"sine",0);pn(330,0.3,0.07,"sine",0.3);pn(262,0.5,0.07,"sine",0.6);}
function sFan(){pn(523,0.15,0.08,"sine",0);pn(659,0.15,0.08,"sine",0.15);pn(784,0.15,0.08,"sine",0.3);pn(1047,0.3,0.1,"sine",0.45);}
function bgm(){if(!ac||mut)return;var ns=[262,294,330,392,440,392,330,294],i=0;if(bgmI)clearInterval(bgmI);bgmI=setInterval(function(){if(mut||!run){clearInterval(bgmI);return;}pn(ns[i%ns.length],0.4,0.02,"sine");i++;},650);}
document.getElementById("muteBtn").onclick=function(){mut=!mut;document.getElementById("muteBtn").textContent=mut?"🔇":"🔊";};

/* ========== UI ========== */
function ui(){document.getElementById("sd").textContent="점수: "+score;document.getElementById("td").textContent="⏱ "+gt+"초";document.getElementById("cd").textContent="제자: "+col2.length+"/20";}
var vt;function sv(t){var v=document.getElementById("versebar");v.textContent=t;v.style.display="block";clearTimeout(vt);vt=setTimeout(function(){v.style.display="none";},4000);}
function afi(ch){var b=document.getElementById("followerBar"),d=document.createElement("div");d.className="fi";d.style.background=ch.robe;d.textContent=ch.name.charAt(0);d.title=ch.name;b.appendChild(d);b.scrollLeft=b.scrollWidth;}
function burst(x,y,c){for(var i=0;i<12;i++)pts.push({x:x*GS+GS/2,y:y*GS+GS/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,l:28,c:c||"#FFD54F",r:2+Math.random()*2.5});}

/* ========== GAME LOOP ========== */
function update(){
  if(!run)return;dir={x:ndir.x,y:ndir.y};
  var hd={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(hd.x<0||hd.x>=COLS||hd.y<0||hd.y>=ROWS){gover();return;}
  for(var i=0;i<snake.length;i++)if(snake[i].x===hd.x&&snake[i].y===hd.y){gover();return;}
  snake.unshift(hd);var ate=false;
  if(tgt&&hd.x===tgt.x&&hd.y===tgt.y){
    score+=50;col2.push(tgt.c);rem.shift();sv(tgt.c.name+": "+tgt.c.verse);afi(tgt.c);burst(hd.x,hd.y,tgt.c.robe);sC();ate=true;
    if(rem.length>0)spawn();else{tgt=null;placeChurch();}
    spawnB();if(spd>80)spd-=3;
  }
  if(church&&hd.x===church.x&&hd.y===church.y){
    run=false;clearTimeout(loopId);clearInterval(tid);sFan();score+=200;showEnding();return;
  }
  if(bon&&hd.x===bon.x&&hd.y===bon.y){score+=bon.p;sv(bon.e+" "+bon.v);burst(hd.x,hd.y,"#FFEB3B");sB();bon=null;ate=true;}
  if(!ate)snake.pop();
  pts=pts.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.l--;p.r*=0.96;return p.l>0;});ui();
}
function draw(){
  if(bgDirty||!bgC||bgC.width!==CW)mkBG();
  cx.drawImage(bgC,0,0);
  if(bon){cx.font=GS*0.55+"px sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText(bon.e,bon.x*GS+GS/2,bon.y*GS+GS/2);}
  if(tgt){cx.fillStyle="rgba(255,235,59,0.2)";cx.beginPath();cx.arc(tgt.x*GS+GS/2,tgt.y*GS+GS/2,GS*0.8,0,6.28);cx.fill();dp(tgt.x*GS+GS/2,tgt.y*GS+GS*0.25,GS*1.05,GS*1.4,tgt.c,false);}
  if(church){
    var chx=church.x*GS,chy=church.y*GS;
    var pulse=0.15+Math.sin(Date.now()/300)*0.08;
    cx.fillStyle="rgba(255,215,0,"+pulse+")";cx.beginPath();cx.arc(chx+GS/2,chy+GS/2,GS*0.95,0,6.28);cx.fill();
    cx.fillStyle="#FFF8E1";cx.fillRect(chx+GS*0.12,chy+GS*0.28,GS*0.76,GS*0.68);
    cx.fillStyle="#D4B868";cx.beginPath();cx.moveTo(chx+GS*0.08,chy+GS*0.28);cx.lineTo(chx+GS/2,chy+GS*0.02);cx.lineTo(chx+GS*0.92,chy+GS*0.28);cx.closePath();cx.fill();
    cx.strokeStyle="#8B4513";cx.lineWidth=2.5;cx.beginPath();cx.moveTo(chx+GS/2,chy-GS*0.08);cx.lineTo(chx+GS/2,chy+GS*0.14);cx.stroke();
    cx.beginPath();cx.moveTo(chx+GS*0.36,chy);cx.lineTo(chx+GS*0.64,chy);cx.stroke();
    cx.fillStyle="#8B6914";cx.fillRect(chx+GS*0.38,chy+GS*0.6,GS*0.24,GS*0.36);
  }
  for(var i=snake.length-1;i>=1;i--){var s=snake[i];if(col2[i-1])dp(s.x*GS+GS/2,s.y*GS+GS*0.25,GS*0.95,GS*1.3,col2[i-1],false);else{cx.fillStyle="rgba(255,255,255,0.2)";cx.beginPath();cx.arc(s.x*GS+GS/2,s.y*GS+GS/2,GS*0.2,0,6.28);cx.fill();}}
  var h=snake[0];cx.fillStyle="rgba(255,215,0,0.1)";cx.beginPath();cx.arc(h.x*GS+GS/2,h.y*GS+GS/2,GS*0.9,0,6.28);cx.fill();
  dp(h.x*GS+GS/2,h.y*GS+GS*0.25,GS*1.1,GS*1.45,JESUS,true);
  for(var j=0;j<pts.length;j++){var p=pts[j];cx.globalAlpha=p.l/28;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.28);cx.fill();}cx.globalAlpha=1;
}
function loop(){update();draw();loopId=setTimeout(loop,spd);}

/* ========== CONTROLS ========== */
var tx2=0,ty2=0,tch=false;
document.addEventListener("touchstart",function(e){if(e.target.tagName==="INPUT"||e.target.tagName==="BUTTON")return;tch=true;tx2=e.touches[0].clientX;ty2=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchmove",function(e){if(e.target.tagName!=="INPUT")e.preventDefault();},{passive:false});
document.addEventListener("touchend",function(e){if(!tch)return;tch=false;if(e.target.tagName==="INPUT"||e.target.tagName==="BUTTON")return;var t=e.changedTouches[0],dx=t.clientX-tx2,dy=t.clientY-ty2;if(Math.abs(dx)<12&&Math.abs(dy)<12)return;if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==-1)ndir={x:1,y:0};else if(dx<0&&dir.x!==1)ndir={x:-1,y:0};}else{if(dy>0&&dir.y!==-1)ndir={x:0,y:1};else if(dy<0&&dir.y!==1)ndir={x:0,y:-1};}},{passive:true});
document.addEventListener("keydown",function(e){if(e.key==="ArrowRight"||e.key==="d"){if(dir.x!==-1)ndir={x:1,y:0};}else if(e.key==="ArrowLeft"||e.key==="a"){if(dir.x!==1)ndir={x:-1,y:0};}else if(e.key==="ArrowDown"||e.key==="s"){if(dir.y!==-1)ndir={x:0,y:1};}else if(e.key==="ArrowUp"||e.key==="w"){if(dir.y!==1)ndir={x:0,y:-1};}});

function startT(){gt=0;clearInterval(tid);tid=setInterval(function(){if(run)gt++;ui();},1000);}

/* ========== FIREBASE ========== */
var fbReady=false,fbCol,fbAdd,fbGet,fbQ,fbOrd,fbLim;
async function fbInit(){if(fbReady)return true;try{var a=await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js");var f=await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js");var app=a.initializeApp({apiKey:"AIzaSyBBoKRzIA6H53Pw5rqux4ck0BftrouKM8s",authDomain:"disciples-iri.firebaseapp.com",projectId:"disciples-iri",storageBucket:"disciples-iri.firebasestorage.app",messagingSenderId:"46688385078",appId:"1:46688385078:web:298c2a2b511bc5ff048097"});db=f.getFirestore(app);fbCol=f.collection;fbAdd=f.addDoc;fbGet=f.getDocs;fbQ=f.query;fbOrd=f.orderBy;fbLim=f.limit;fbReady=true;return true;}catch(e){console.warn("FB",e);return false;}}
async function saveRec(nm,cnt,sec,sc,clear){if(!await fbInit())return;try{await fbAdd(fbCol(db,"records"),{name:nm||"익명",count:cnt,seconds:sec,score:sc,cleared:!!clear,date:new Date().toISOString()});}catch(e){}}

async function showRank(el){if(!el)return;el.innerHTML="<p style='text-align:center;font-size:11px;color:#FFD54F'>🏆 랭킹</p>";var r=await loadRec();if(!r.length){el.innerHTML+="<p style='text-align:center;font-size:10px;color:#aaa'>아직 기록이 없습니다</p>";return;}var m=["🥇","🥈","🥉"];r.forEach(function(x,i){var d=document.createElement("div");d.className="rr";var cl=x.cleared?"✅":"";d.innerHTML="<span>"+(i<3?m[i]:(i+1)+"위")+" "+x.name+" "+cl+"</span><span>"+x.count+"명 / "+x.seconds+"초 / "+x.score+"점</span>";el.appendChild(d);});}

function gover(){run=false;clearTimeout(loopId);clearInterval(tid);sO();if(bgmI)clearInterval(bgmI);saveRec(pname,col2.length,gt,score,false);
var o=document.getElementById("ov");o.innerHTML="<h1>게임 종료</h1><p><b>"+pname+"</b>님</p><p>전도: "+col2.length+"명 | 시간: "+gt+"초 | 점수: "+score+"점</p><p style='color:#FFD54F;margin:6px 0'>"+OVERV[Math.random()*OVERV.length|0]+"</p><div class='rb' id='rk2'></div><button id='rb2'>다시 시작</button>";o.style.display="flex";showRank(document.getElementById("rk2"));document.getElementById("rb2").onclick=function(){startGame();};}

function showEnding(){if(bgmI)clearInterval(bgmI);saveRec(pname,col2.length,gt,score,true);
var o=document.getElementById("ov");o.innerHTML="<h1>🎉 축하합니다! 🎉</h1><h2>모든 사람을 만나 교회에 도착했습니다!</h2><p><b>"+pname+"</b>님의 기록</p><p>전도: "+col2.length+"명 | 시간: "+gt+"초 | 점수: "+score+"점</p><p style='color:#FFD54F;margin:8px 0;font-size:13px'>\"그러므로 너희는 가서 모든 민족을<br>제자로 삼아 아버지와 아들과 성령의<br>이름으로 세례를 베풀고\" (마 28:19)</p><div class='rb' id='rk3'></div><button id='rb3'>다시 시작</button>";o.style.display="flex";showRank(document.getElementById("rk3"));document.getElementById("rb3").onclick=function(){startGame();};}

function showStart(){var o=document.getElementById("ov");o.innerHTML="<h1>✝️ 나를 따르라</h1><h2>Follow Me</h2><p>예수님이 되어 성경 속 인물들과<br>소중한 사람들을 만나보세요!<br><br>스와이프로 방향을 조절하세요.<br>모든 인물을 만난 후 교회로 가면 클리어!</p><input id='ni' placeholder='이름을 입력하세요' maxlength='10'><div class='rb' id='rk'></div><button id='sb'>게임 시작</button>";o.style.display="flex";showRank(document.getElementById("rk"));document.getElementById("sb").onclick=function(){pname=(document.getElementById("ni").value||"").trim()||"익명";startGame();};}

resize();window.addEventListener("resize",function(){resize();});showStart();
})();
