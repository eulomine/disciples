  if (!db) { box.innerHTML='<div style="color:#888">오프라인</div>'; return; }

      var v = d.data();

      allData.push(v);

function bgKingdom(c,i){grassBG(c,'#7B8C6A','#5A6B4A');if(i===6){c.fillStyle='#C8A882';c.fillRect(AW*.6,AH*.12,AW*.28,AH*.42);dRiver(c,AW*.02,GS*.5,'rgba(70,130,180,.25)')}if(i===7){var r=mrng(707);c.fillStyle='#DAA520';for(var j=0;j<40;j++){c.fillRect(r()*AW,AH*.42+r()*AH*.35,1.5,-(8+r()*10))}dBldg(c,AW*.72,AH*.38,GS,GS*.75,'#D2B48C','#8B4513')}if(i===8){dRiver(c,AW*.44,GS*.35,'rgba(100,180,220,.4)');dBldg(c,AW*.76,AH*.38,GS*.8,GS*.65,'#C8B090','#8B6914')}if(i===9){dBldg(c,AW*.04,AH*.42,GS*.7,GS*.55,'#C8B090','#8B6914');dTemple(c,AW*.28,AH*.88,AW*.42,AH*.18)}}
function bgDivided(c,i){c.fillStyle='#7B8C6A';c.fillRect(0,0,AW,AH/2);c.fillStyle='#6B7C5A';c.fillRect(0,AH/2,AW,AH/2);c.fillStyle='#555';c.fillRect(0,AH/2-2,AW,4);dBldg(c,AW*.08,AH*.32,GS*.6,GS*.4,'#B8A080','#704214');if(i===10){dMtn(c,AW*.48,AH*.38,AW*.3,AH*.28,'#8B7355')}if(i===11){c.fillStyle='#DAA520';c.fillRect(AW*.47,AH*.06,AW*.06,GS*.4)}}
function bgExile(c,i){var g=c.createLinearGradient(0,0,0,AH);g.addColorStop(0,'#4A6E8C');g.addColorStop(1,'#C8B090');c.fillStyle=g;c.fillRect(0,0,AW,AH);if(i===12){c.fillStyle='#4A3728';c.beginPath();c.arc(AW*.2,AH*.78,GS,0,6.28);c.fill()}if(i===13){c.fillStyle='#DAA520';c.fillRect(AW*.4,AH*.45,AW*.2,GS*.5)}}
function bgWild(c){var g=c.createLinearGradient(0,0,0,AH);g.addColorStop(0,'#C2956B');g.addColorStop(1,'#A07850');c.fillStyle=g;c.fillRect(0,0,AW,AH);dRiver(c,AW*.82,GS*.4,'rgba(70,130,180,.2)')}
function bgGospel(c,i){grassBG(c,'#6B8E23','#4A6E18');c.fillStyle='rgba(70,130,200,.25)';c.beginPath();c.arc(AW*.68,AH*.3,AW*.15,0,6.28);c.fill()}
function bgModern(c,i){var g=c.createLinearGradient(0,0,0,AH*.35);g.addColorStop(0,'#87CEEB');g.addColorStop(1,'#B0D4E8');c.fillStyle=g;c.fillRect(0,0,AW,AH*.35);c.fillStyle='#90A868';c.fillRect(0,AH*.35,AW,AH*.65);var cls=['#607D8B','#78909C','#546E7A','#455A64'];for(var j=0;j<4;j++){dBldg(c,j*AW/4+8,AH*.35,GS*.8,GS*(1+j*.3),cls[j],'#333')}}

/* === Character Draw Function === */
function dp(px,py,w,h,ch,isJ,fac,fr){
  var c=X;var cx=px+w/2,cy=py+h/2;var s=w/50;
  var sk=isJ?JESUS.skin:ch.skin,rb=isJ?JESUS.robe:ch.robe,rb2=isJ?JESUS.robe2:ch.robe2,hr=isJ?JESUS.hair:ch.hair;
  var ml=isJ?true:!!ch.male,od=isJ?false:!!ch.old,md=isJ?false:!!ch.modern;
  c.save();c.translate(cx,cy);
  var hR=10*s,bH=15*s,bW=13*s,lH=10*s,aL=11*s;
  var hY=-bH/2-hR-lH/3,bT=hY+hR,lT=bT+bH;
  var la1=fr?.32:-.32,la2=fr?-.32:.32;
  var side=(fac===1||fac===3),flip=fac===3?-1:1;
  if(side){
    c.scale(flip,1);
    c.save();c.translate(-1*s,lT);c.rotate(la2);c.fillStyle=md?'#36454F':sk;c.fillRect(-2*s,0,4*s,lH);c.restore();
    c.save();c.translate(2*s,lT);c.rotate(la1);c.fillStyle=md?'#36454F':sk;c.fillRect(-2*s,0,4*s,lH);c.restore();
    var rg=c.createLinearGradient(0,bT,0,bT+bH);rg.addColorStop(0,rb);rg.addColorStop(1,rb2);c.fillStyle=rg;c.fillRect(-bW/2+2*s,bT,bW-4*s,bH);
    if(isJ){c.fillStyle=JESUS.sash;c.fillRect(-1*s,bT+2*s,3*s,bH-4*s)}
    c.fillStyle=sk;c.beginPath();c.arc(0,hY,hR,0,6.28);c.fill();
    c.fillStyle=hr;c.beginPath();c.arc(0,hY-1*s,hR*.7,3.14,0);c.fill();
    if(ml&&od){c.fillStyle='#aaa';c.beginPath();c.moveTo(hR*.4,hY+2*s);c.lineTo(hR*.6,hY+hR);c.lineTo(0,hY+hR*.6);c.closePath();c.fill()}
    c.fillStyle='#000';c.beginPath();c.arc(hR*.35,hY-.5*s,1.3*s,0,6.28);c.fill();
  }else{
    var front=(fac===2);
    c.save();c.translate(-3.5*s,lT);c.rotate(la1);c.fillStyle=md?'#36454F':sk;c.fillRect(-2*s,0,4*s,lH);c.restore();
    c.save();c.translate(3.5*s,lT);c.rotate(la2);c.fillStyle=md?'#36454F':sk;c.fillRect(-2*s,0,4*s,lH);c.restore();
    var rg=c.createLinearGradient(0,bT,0,bT+bH);rg.addColorStop(0,rb);rg.addColorStop(1,rb2);c.fillStyle=rg;c.fillRect(-bW/2,bT,bW,bH);
    c.fillStyle=sk;c.beginPath();c.arc(0,hY,hR,0,6.28);c.fill();
    if(front){
      c.fillStyle=hr;c.beginPath();c.arc(0,hY-2*s,hR*.75,3.14,0);c.fill();
      c.fillStyle='#000';c.beginPath();c.arc(-3.5*s,hY-.5*s,1.4*s,0,6.28);c.fill();c.beginPath();c.arc(3.5*s,hY-.5*s,1.4*s,0,6.28);c.fill();
      if(ml&&(od||isJ)){c.fillStyle='#aaa';c.beginPath();c.moveTo(-3*s,hY+4*s);c.quadraticCurveTo(0,hY+hR*1.3,3*s,hY+4*s);c.fill()}
    }else{
      c.fillStyle=hr;c.beginPath();c.arc(0,hY,hR*1.02,0,6.28);c.fill();
    }
  }
  if(!isJ&&ch.crown){c.fillStyle='#FFD700';c.fillRect(-5*s,hY-hR-2*s,10*s,4*s)}
  if(isJ){c.strokeStyle='rgba(255,215,0,0.4)';c.lineWidth=2*s;c.beginPath();c.arc(0,hY,hR*1.4,0,6.28);c.stroke()}
  c.restore();
  var nm=isJ?JESUS.name:ch.name;
  var fs=Math.max(8,Math.floor(s*8));
  c.fillStyle='rgba(0,0,0,.5)';c.font='bold '+fs+'px sans-serif';c.textAlign='center';c.textBaseline='top';
  var tw=c.measureText(nm).width;
  c.fillRect(cx-tw/2-3,py+h-s*1-1,tw+6,fs+3);
  c.fillStyle='#fff';c.fillText(nm,cx,py+h-s*1);
}

/* === Game Core Logic === */
function rndE(){for(var a=0;a<300;a++){var gx=Math.floor(Math.random()*COLS),gy=Math.floor(Math.random()*ROWS),ok=true;for(var i=0;i<snake.length;i++)if(snake[i].x===gx&&snake[i].y===gy){ok=false;break}if(target&&target.x===gx&&target.y===gy)ok=false;if(ok)return{x:gx,y:gy}}return{x:0,y:0}}
function spawn(){if(collected>=CH.length){var p=rndE();church={x:p.x,y:p.y};target=null;return}var p=rndE();target={x:p.x,y:p.y,idx:collected,bounce:0}}
function spawnB(){if(Math.random()>.35)return;var p=rndE();var b=BONUS[Math.floor(Math.random()*BONUS.length)];bonus={x:p.x,y:p.y,emoji:b.emoji,pts:b.pts,verse:b.verse,life:200}}
function init(){var cx2=Math.floor(COLS/2),cy2=Math.floor(ROWS/2);snake=[{x:cx2,y:cy2}];followers=[];dir={x:1,y:0};ndir={x:1,y:0};collected=0;score=0;secs=0;spd=220;target=null;bonus=null;parts=[];pops=[];flash=0;wf=0;church=null;stgIdx=0;buildBG();spawn()}
function burst(px,py,col,n){for(var i=0;i<(n||10);i++)parts.push({x:px,y:py,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:30+Math.random()*15,ml:45,c:col||'#FFD700',sz:2+Math.random()*3})}
function addPop(px,py,txt,col){pops.push({x:px,y:py,t:txt,c:col||'#FFD700',life:40,ml:40})}

function draw(){
  var c=X;c.fillStyle='#1a1a2e';c.fillRect(0,0,W,H);
  if(bgCv)c.drawImage(bgCv,AX,AY,AW,AH);
  c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=2;c.strokeRect(AX-1,AY-1,AW+2,AH+2);
  if(bonus){c.font=GS*.6+'px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(bonus.emoji,AX+bonus.x*GS+GS/2,AY+bonus.y*GS+GS/2)}
  if(church){
    var cx2=AX+church.x*GS+GS/2,cy2=AY+church.y*GS+GS/2;
    c.fillStyle='#F5F0E0';c.fillRect(cx2-GS*.3,cy2-GS*.1,GS*.6,GS*.4);
    c.fillStyle='#8B4513';c.beginPath();c.moveTo(cx2-GS*.35,cy2-GS*.1);c.lineTo(cx2,cy2-GS*.4);c.lineTo(cx2+GS*.35,cy2-GS*.1);c.closePath();c.fill();
  }
  if(target){
    var tx=AX+target.x*GS,ty=AY+target.y*GS;target.bounce=(target.bounce||0)+.06;var bo=Math.sin(target.bounce)*3;
    dp(tx,ty-bo,GS,GS,CH[target.idx],false,2,wf);
  }
  for(var i=snake.length-1;i>=1;i--){
    var seg=snake[i],sx=AX+seg.x*GS,sy=AY+seg.y*GS,fi=i-1;
    if(fi>=0&&fi<followers.length){
      var ah=snake[i-1],bf=2;
      if(ah.x>seg.x)bf=1;else if(ah.x<seg.x)bf=3;else if(ah.y<seg.y)bf=0;
      dp(sx,sy,GS,GS,CH[followers[fi]],false,bf,wf);
    }
  }
  var hf=2;if(dir.x>0)hf=1;else if(dir.x<0)hf=3;else if(dir.y<0)hf=0;
  dp(AX+snake[0].x*GS,AY+snake[0].y*GS,GS,GS,null,true,hf,wf);
  
  for(var i=0;i<parts.length;i++){
    var p=parts[i];var al=p.life/p.ml;c.fillStyle=p.c;c.globalAlpha=al;c.beginPath();c.arc(p.x,p.y,p.sz*al,0,6.28);c.fill();
  }c.globalAlpha=1;
  if(flash>0){c.fillStyle='rgba(255,255,255,'+flash+')';c.fillRect(0,0,W,H);flash-=.03}
  for(var i=0;i<pops.length;i++){
    var p=pops[i];var al=p.life/p.ml;c.globalAlpha=al;c.fillStyle=p.c;c.font='bold 16px sans-serif';c.textAlign='center';c.fillText(p.t,p.x,p.y-(1-al)*20);
  }c.globalAlpha=1;

  c.fillStyle='rgba(0,0,0,.6)';c.fillRect(0,0,W,42);
  c.fillStyle='#fff';c.font='bold 13px sans-serif';c.textAlign='left';c.textBaseline='middle';c.fillText('점수: '+score,10,21);
  c.textAlign='center';c.fillText('⏱ '+secs+'초',W/2,21);
  c.textAlign='right';c.fillText('제자: '+collected+'/'+CH.length,W-10,21);
  
  var barY=AY+AH+3;
  if(vtick>0){
    c.fillStyle='rgba(0,0,0,.7)';c.fillRect(0,barY-30,W,22);
    c.fillStyle='#FFD700';c.font='11px sans-serif';c.textAlign='center';c.fillText(vtxt,W/2,barY-19);
    vtick--;
  }
}

var lastMv=0;
function upd(ts){
  if(!running)return;loopId=requestAnimationFrame(upd);
  if(ts-lastMv<spd){draw();return}lastMv=ts;wf=1-wf;
  dir={x:ndir.x,y:ndir.y};var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){gover();return}
  for(var i=0;i<snake.length;i++)if(snake[i].x===head.x&&snake[i].y===head.y){gover();return}
  snake.unshift(head);var ate=false;
  if(target&&head.x===target.x&&head.y===target.y){
    ate=true;var ch2=CH[target.idx];score+=50;followers.push(target.idx);collected=followers.length;stgIdx=collected<CH.length?collected:CH.length-1;buildBG();
    burst(AX+head.x*GS+GS/2,AY+head.y*GS+GS/2,ch2.robe,12);addPop(AX+head.x*GS+GS/2,AY+head.y*GS+GS/2,'+50');
    flash=.2;vtxt=ch2.verse;vtick=120;sfxC();if(spd>80)spd-=6;spawn();if(!bonus)spawnB();
  }
  if(bonus&&head.x===bonus.x&&head.y===bonus.y){
    score+=bonus.pts;addPop(AX+head.x*GS+GS/2,AY+head.y*GS+GS/2,'+'+bonus.pts,'#FF6347');
    vtxt=bonus.verse;vtick=90;sfxB();bonus=null;
  }
  if(church&&head.x===church.x&&head.y===church.y){happy();return}
  if(!ate)snake.pop();
  if(bonus){bonus.life--;if(bonus.life<=0)bonus=null}
  parts=parts.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life--;return p.life>0});
  pops=pops.filter(function(p){p.life--;return p.life>0});
  draw();
}

function startTimer(){timId=setInterval(function(){if(running)secs++},1000)}

var tsx=0,tsy=0;
document.addEventListener('touchstart',function(e){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0&&dir.x!==-1)ndir={x:1,y:0};else if(dx<0&&dir.x!==1)ndir={x:-1,y:0};
  }else{
    if(dy>0&&dir.y!==-1)ndir={x:0,y:1};else if(dy<0&&dir.y!==1)ndir={x:0,y:-1};
  }
},{passive:true});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'&&dir.x!==-1)ndir={x:1,y:0};else if(e.key==='ArrowLeft'&&dir.x!==1)ndir={x:-1,y:0};
  else if(e.key==='ArrowDown'&&dir.y!==-1)ndir={x:0,y:1};else if(e.key==='ArrowUp'&&dir.y!==1)ndir={x:0,y:-1};
});

function gover(){running=false;if(loopId)cancelAnimationFrame(loopId);if(timId)clearInterval(timId);stopBGM();sfxO();showEnd(false)}
function happy(){running=false;if(loopId)cancelAnimationFrame(loopId);if(timId)clearInterval(timId);stopBGM();sfxF();score+=200;showEnd(true)}

/* === UI Pages === */
function showStart() {
  OV.classList.remove('hide');
  OV.innerHTML = '<h1>✝️ Follow Me</h1><h2>나를 따르라</h2>' +
    '<p style="font-size:12px;color:#bbb;margin-bottom:20px;text-align:center">예수님이 되어 제자들을 부르세요!</p>' +
    '<button class="bS" id="go">게임 시작</button>';
  document.getElementById('go').onclick = function() { startGame() };
}

var lastDocId = null;
function showEnd(win) {
  OV.classList.remove('hide');
  var v = win ? '너희는 가서 모든 민족을 제자로 삼아 (마28:19)' : OVERV[Math.floor(Math.random() * OVERV.length)];
  OV.innerHTML = '<h1>' + (win ? '🎉 승리!' : '💫 종료') + '</h1>' +
    '<p style="font-size:15px; margin-bottom:10px;">내 점수: <b style="color:#f0c040">' + score + '점</b></p>' +
    '<div style="display:flex;gap:6px;margin:10px 0;">' +
    '<input id="ni" type="text" placeholder="이름" maxlength="10" style="width:120px;margin:0"/>' +
    '<button class="bG" id="sv" style="margin:0;padding:5px 15px;font-size:14px">등록</button></div>' +
    '<button class="bR" id="re" style="margin-bottom:10px">다시 시작</button>' +
    '<div class="rb" id="rk2" style="display:none"></div>';

  var ni = document.getElementById('ni'); ni.value = pname || '';
  var rk2 = document.getElementById('rk2');

  document.getElementById('sv').onclick = function() {
    var n = ni.value.trim();
    if (!n) { ni.style.borderColor='#f44'; return; }
    pname = n; this.disabled = true;
    saveRec(pname, collected, secs, score).then(function(docRef) {
      lastDocId = docRef.id;
      rk2.style.display = 'block';
      loadRecs(rk2, lastDocId);
    });
  };
  document.getElementById('re').onclick = function() { startGame() };
}

function startGame(){OV.classList.add('hide');ea();resize();init();running=true;lastMv=0;startTimer();startBGM();loopId=requestAnimationFrame(upd)}

resize();initFB();showStart();

})();
}catch(e){document.body.innerHTML='<h2>Error</h2><pre>'+e.message+'</pre>';}
</script>
